<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Chi Tiết Khóa Học</title>
</head>
<body>
<div layout:fragment="content">
    <h2>Chi Tiết Khóa Học</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card">
        <div class="card-body">
            <h3 class="card-title" th:text="${course.name}"></h3>
            <p class="text-muted">Mã khóa học: <strong th:text="${course.code}"></strong></p>

            <table class="table table-bordered">
                <tbody>
                <tr>
                    <th style="width: 30%;">Tên khóa học</th>
                    <td th:text="${course.name}"></td>
                </tr>
                <tr>
                    <th>Mã khóa học</th>
                    <td th:text="${course.code}"></td>
                </tr>
                <tr>
                    <th>Trình độ</th>
                    <td th:text="${course.level}"></td>
                </tr>
                <tr>
                    <th>Học phí</th>
                    <td th:text="${#numbers.formatDecimal(course.tuitionFee, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                </tr>
                <tr>
                    <th>Giảng viên</th>
                    <td th:text="${course.instructor}"></td>
                </tr>
                <tr>
                    <th>Thời lượng</th>
                    <td th:text="${course.duration}"></td>
                </tr>
                <tr>
                    <th>Ngày khai giảng</th>
                    <td th:text="${#temporals.format(course.startDate, 'dd/MM/yyyy')}"></td>
                </tr>
                <tr>
                    <th>Số học viên hiện tại</th>
                    <td th:text="${course.studentCount}"></td>
                </tr>
                <tr>
                    <th>Trạng thái</th>
                    <td>
                        <span th:if="${course.isFull}" class="badge bg-danger">Đã đủ chỗ</span>
                        <span th:unless="${course.isFull}" class="badge bg-success">Còn chỗ</span>
                    </td>
                </tr>
                <tr>
                    <th>Lộ trình học</th>
                    <td th:text="${course.description}"></td>
                </tr>
                </tbody>
            </table>

            <div class="mt-4">
                <a th:href="@{/course/list}" class="btn btn-secondary">Quay lại danh sách</a>
                <a th:href="@{/course/edit/{code}(code=${course.code})}" class="btn btn-warning">Sửa thông tin</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
